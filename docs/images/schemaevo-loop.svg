<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">SchemaEvo optimizer loop</title>
  <desc id="desc">A diagram showing the closed-loop schema optimizer: seed population, shared minibatch evaluation, parent and operator selection, legal mutation, validation, budget tracking, Pareto maintenance, and final candidates.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .label { font: 700 20px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .step { font: 800 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .blue { fill: #e0f2fe; stroke: #0284c7; }
      .green { fill: #dcfce7; stroke: #16a34a; }
      .amber { fill: #fef3c7; stroke: #d97706; }
      .purple { fill: #f3e8ff; stroke: #9333ea; }
      .slate { fill: #e2e8f0; stroke: #475569; }
      .rose { fill: #ffe4e6; stroke: #e11d48; }
      .badge { fill: #334155; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #475569; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="680" />
  <text class="title" x="60" y="62">Closed-loop schema optimization</text>
  <text class="subtitle" x="60" y="94">Search improves schema candidates under fixed deployment and budget constraints.</text>

  <rect class="box blue" x="90" y="150" width="230" height="112" rx="14" />
  <circle class="badge" cx="126" cy="186" r="18" />
  <text class="step" x="121" y="192">1</text>
  <text class="label" x="158" y="186">Seed population</text>
  <text class="small" x="158" y="218">templates, supplied schemas, controls</text>

  <rect class="box green" x="486" y="120" width="240" height="112" rx="14" />
  <circle class="badge" cx="522" cy="156" r="18" />
  <text class="step" x="517" y="162">2</text>
  <text class="label" x="554" y="156">Shared evaluation</text>
  <text class="small" x="554" y="188">deterministic minibatches and rungs</text>

  <rect class="box amber" x="875" y="150" width="235" height="112" rx="14" />
  <circle class="badge" cx="911" cy="186" r="18" />
  <text class="step" x="906" y="192">3</text>
  <text class="label" x="943" y="186">Select move</text>
  <text class="small" x="943" y="218">parent plus legal operator</text>

  <rect class="box purple" x="875" y="410" width="235" height="112" rx="14" />
  <circle class="badge" cx="911" cy="446" r="18" />
  <text class="step" x="906" y="452">4</text>
  <text class="label" x="943" y="446">Mutate schema</text>
  <text class="small" x="943" y="478">add, drop, rename, constrain, rewire</text>

  <rect class="box rose" x="486" y="445" width="240" height="112" rx="14" />
  <circle class="badge" cx="522" cy="481" r="18" />
  <text class="step" x="517" y="487">5</text>
  <text class="label" x="554" y="481">Validate and dedup</text>
  <text class="small" x="554" y="513">reject invalid or duplicate schemas</text>

  <rect class="box slate" x="90" y="410" width="230" height="112" rx="14" />
  <circle class="badge" cx="126" cy="446" r="18" />
  <text class="step" x="121" y="452">6</text>
  <text class="label" x="158" y="446">Track frontier</text>
  <text class="small" x="158" y="478">score, cost, tokens, invalidity, latency</text>

  <path class="loop" d="M 320 206 C 385 152, 421 145, 486 176" />
  <path class="loop" d="M 726 176 C 797 145, 829 151, 875 206" />
  <path class="loop" d="M 992 262 V 410" />
  <path class="loop" d="M 875 466 C 808 538, 782 546, 726 501" />
  <path class="loop" d="M 486 501 C 411 546, 372 538, 320 466" />
  <path class="loop" d="M 205 410 V 262" />

  <rect class="box" x="400" y="286" width="400" height="92" rx="14" />
  <text class="label" x="465" y="324">Budget gate remains active</text>
  <text class="small" x="465" y="354">call, token, dollar, invalid-output, and latency accounting</text>

  <path class="line" d="M 725 522 C 790 578, 844 588, 905 570" />
  <rect class="box" x="905" y="548" width="205" height="78" rx="14" />
  <text class="label" x="940" y="582">Rejected audit</text>
  <text class="small" x="940" y="608">reasoned schema rejects</text>

  <path class="line" d="M 320 466 C 388 594, 500 615, 590 585" />
  <rect class="box" x="590" y="570" width="230" height="78" rx="14" />
  <text class="label" x="628" y="604">Final candidates</text>
  <text class="small" x="628" y="630">Pareto set plus primary choice</text>
</svg>
