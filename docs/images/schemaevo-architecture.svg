<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">SchemaEvo fixed-call architecture</title>
  <desc id="desc">A diagram showing how SchemaEvo collects train-only traces, builds a schema pool, compiles schema contracts into a fixed call graph, gates invariants, evaluates candidates, and writes artifacts.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .label { font: 700 20px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .note { font: 700 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .blue { fill: #e0f2fe; stroke: #0284c7; }
      .green { fill: #dcfce7; stroke: #16a34a; }
      .amber { fill: #fef3c7; stroke: #d97706; }
      .purple { fill: #f3e8ff; stroke: #9333ea; }
      .rose { fill: #ffe4e6; stroke: #e11d48; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .guard { fill: #ffffff; stroke: #94a3b8; stroke-dasharray: 8 8; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="640" rx="0" />
  <text class="title" x="60" y="62">SchemaEvo fixed-call architecture</text>
  <text class="subtitle" x="60" y="94">Evolve typed intermediate schemas while preserving the deployed program shape.</text>

  <rect class="box blue" x="60" y="145" width="180" height="120" rx="14" />
  <text class="label" x="90" y="185">Base program</text>
  <text class="small" x="90" y="216">ordered modules</text>
  <text class="small" x="90" y="238">frozen demo IDs</text>

  <path class="line" d="M 240 205 H 310" />

  <rect class="box green" x="310" y="145" width="180" height="120" rx="14" />
  <text class="label" x="344" y="185">Trace capture</text>
  <text class="small" x="344" y="216">train split only</text>
  <text class="small" x="344" y="238">raw outputs logged</text>

  <path class="line" d="M 490 205 H 560" />

  <rect class="box amber" x="560" y="122" width="220" height="166" rx="14" />
  <text class="label" x="604" y="162">Schema pool</text>
  <text class="small" x="604" y="194">human templates</text>
  <text class="small" x="604" y="216">random controls</text>
  <text class="small" x="604" y="238">trace proposals</text>
  <text class="small" x="604" y="260">validator-only control</text>

  <path class="line" d="M 780 205 H 850" />

  <rect class="box purple" x="850" y="145" width="220" height="120" rx="14" />
  <text class="label" x="894" y="185">Compiler</text>
  <text class="small" x="894" y="216">prompt contracts</text>
  <text class="small" x="894" y="238">typed output fields</text>

  <path class="line" d="M 960 265 V 340" />

  <rect class="guard" x="805" y="340" width="310" height="104" rx="14" />
  <text class="label" x="855" y="380">Invariant gate</text>
  <text class="small" x="855" y="411">same calls, retriever top-k, model, demos</text>

  <path class="line" d="M 805 392 H 730" />

  <rect class="box rose" x="510" y="340" width="220" height="104" rx="14" />
  <text class="label" x="552" y="380">Evaluation</text>
  <text class="small" x="552" y="411">selection, confirmation, ablations</text>

  <path class="line" d="M 510 392 H 435" />

  <rect class="box" x="210" y="340" width="225" height="104" rx="14" />
  <text class="label" x="252" y="380">Run artifacts</text>
  <text class="small" x="252" y="411">schemas, scores, logs, cost ledger</text>

  <rect class="guard" x="60" y="505" width="1080" height="76" rx="14" />
  <text class="note" x="92" y="540">Primary guardrail:</text>
  <text class="small" x="230" y="540">SchemaEvo can change contracts and validators, but not the call graph, labels, retriever budget, model settings, or final metric.</text>
</svg>
